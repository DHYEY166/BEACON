version: '3.9'
services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data/outputs:/app/data/outputs
    environment:
      - MODEL_PATH=/models/beacon-e4b
      - CHUNK_DATA_PATH=data/outputs/chunk_metadata.json
      - DATABASE_URL=sqlite:///./beacon.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
